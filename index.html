<body>

<h1>HVAC AI</h1>
<p class="sub">Zafer Özkaraman</p>

<div class="menu" onclick="aiTeshis()">🤖 AI TEŞHİS</div>
<div class="menu">🔥 GAZ ANALİZ</div>
<div class="menu">🌡️ SENSÖR TEST</div>
<div class="menu">❄️ SUPERHEAT</div>

<div class="menu">📊 GAZ TABLOSU</div>
<div class="menu">🏢 VRF SERVİS</div>

<script>

function aiTeshis(){

let ariza = prompt("Arızayı yaz");

if(!ariza) return;

ariza = ariza.toLowerCase();

let sonuc="Teşhis bulunamadı";

if(ariza.includes("soğutmuyor")){
sonuc="1️⃣ Gaz eksik\n2️⃣ Kompresör çalışmıyor\n3️⃣ 4 yollu vana arızası";
}

else if(ariza.includes("buzlan")){
sonuc="1️⃣ Gaz eksik\n2️⃣ Hava debisi düşük\n3️⃣ Evaporatör kirli";
}

else if(ariza.includes("defrost")){
sonuc="1️⃣ Dış serpantin kirli\n2️⃣ Sensör arızası\n3️⃣ Gaz eksik";
}

else if(ariza.includes("çalışmıyor")){
sonuc="1️⃣ Sigorta\n2️⃣ Kart\n3️⃣ Kompresör";
}

else if(ariza.includes("kaçak")){
sonuc="1️⃣ Rakor gevşek\n2️⃣ Kaynak çatlağı\n3️⃣ Serpantin kaçak";
}

else if(ariza.includes("yüksek basınç")){
sonuc="1️⃣ Kondanser kirli\n2️⃣ Fan düşük\n3️⃣ Gaz fazla";
}

else if(ariza.includes("düşük basınç")){
sonuc="1️⃣ Gaz eksik\n2️⃣ Kapiler tıkalı\n3️⃣ Kompresör zayıf";
}

alert(sonuc);

}

</script>
