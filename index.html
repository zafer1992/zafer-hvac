<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>ZAFER AI HVAC</title>

<style>

body{
background:#0f172a;
font-family:Arial;
margin:0;
padding:15px;
color:white;
}

.header{
text-align:center;
margin-bottom:20px;
}

.header h1{
margin:0;
font-size:28px;
}

.header p{
color:#94a3b8;
margin-top:4px;
font-size:13px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.card{
background:#1e293b;
padding:14px;
border-radius:12px;
text-align:center;
font-size:14px;
cursor:pointer;
transition:0.2s;
}

.card:hover{
background:#334155;
transform:scale(1.04);
}

.result{
margin-top:16px;
background:#020617;
padding:14px;
border-radius:10px;
white-space:pre-line;
font-size:14px;
}

</style>

</head>

<body>

<div class="header">
<h1>ZAFER AI</h1>
<p>HVAC MASTER TOOL</p>
</div>

<div class="grid">

<div class="card" onclick="ai()">🤖 AI TEŞHİS</div>
<div class="card" onclick="gaz()">🔥 GAZ ANALİZ</div>

<div class="card" onclick="superheat()">❄ SUPERHEAT</div>
<div class="card" onclick="subcool()">💧 SUBCOOL</div>

<div class="card" onclick="delta()">📉 DELTA-T</div>
<div class="card" onclick="sensor()">🌡 SENSÖR</div>

<div class="card" onclick="elektrik()">⚡ ELEKTRİK</div>
<div class="card" onclick="vrf()">🏢 VRF SERVİS</div>

<div class="card" onclick="gaztablo()">📊 GAZ TABLO</div>

</div>

<div id="sonuc" class="result">
Sistem hazır
</div>

<script>

function yaz(x){
document.getElementById("sonuc").innerText=x
}

/* AI TEŞHİS */

function ai(){

let a=prompt("Belirtiyi yaz")

if(!a)return

a=a.toLowerCase()

let s="Teşhis bulunamadı"

/* soğutmuyor */

if(a.includes("soğutmuyor") || a.includes("az soğutuyor"))
s="Gaz eksik\nKondanser kirli\nKompresör zayıf"

/* buzlanma */

else if(a.includes("buz") || a.includes("buzlan"))
s="Gaz eksik\nEvaporatör kirli\nFan devri düşük"

/* defrost */

else if(a.includes("defrost"))
s="Dış serpantin kirli\nSensör arızası\nGaz düşük"

/* fan */

else if(a.includes("fan"))
s="Fan motoru\nKapasitör\nKart çıkışı"

/* çalışmıyor */

else if(a.includes("çalışmıyor"))
s="Sigorta\nKart\nBesleme"

/* gaz düşük */

else if(a.includes("gaz düşük"))
s="Gaz eksik\nSistemde kaçak olabilir"

/* gaz yüksek */

else if(a.includes("gaz yüksek"))
s="Gaz fazla\nKondanser kirli"

yaz(s)

}

/* GAZ ANALİZ */

function gaz(){

let gaz=prompt("Gaz tipi")
let sic=prompt("Dış hava °C")
let bar=prompt("Basınç bar")

let yorum=""

if(bar<16)
yorum="Gaz düşük"

else if(bar>24)
yorum="Gaz yüksek"

else
yorum="Basınç normal"

yaz("Gaz:"+gaz+"\nDış hava:"+sic+"\nBasınç:"+bar+"\n\n"+yorum)

}

/* SUPERHEAT */

function superheat(){

let boru=prompt("Emiş boru °C")
let evap=prompt("Evap °C")

let sh=boru-evap

yaz("Superheat = "+sh+"°C")

}

/* SUBCOOL */

function subcool(){

let sivi=prompt("Sıvı boru °C")
let cond=prompt("Kondens °C")

let sc=cond-sivi

yaz("Subcool = "+sc+"°C")

}

/* DELTA T */

function delta(){

let gir=prompt("Giriş hava °C")
let cik=prompt("Çıkış hava °C")

let dt=gir-cik

yaz("Delta-T = "+dt+"°C")

}

/* SENSOR */

function sensor(){

let ohm=prompt("Sensör kΩ")

let s=""

if(ohm>15)s="≈20°C"
else if(ohm>10)s="≈30°C"
else if(ohm>6)s="≈40°C"
else s="≈50°C"

yaz("Sensör:"+ohm+"kΩ\nSıcaklık:"+s)

}

/* ELEKTRİK */

function elektrik(){

let amp=prompt("Kompresör amper")

let yorum=""

if(amp<3)
yorum="Kompresör zayıf"

else if(amp>10)
yorum="Aşırı akım"

else
yorum="Normal"

yaz("Amper:"+amp+"\nDurum:"+yorum)

}

/* VRF */

function vrf(){

let kod=prompt("VRF hata kodu")

let s=""

if(kod=="H2") s="IPM inverter arızası"
else if(kod=="H3") s="Kompresör aşırı akım"
else if(kod=="P03") s="Fan motor arızası"
else if(kod=="P04") s="Fan kilit"
else if(kod=="E03") s="İletişim hatası"
else s="Kod veritabanında yok"

yaz("Kod:"+kod+"\n"+s)

}

/* GAZ TABLO */

function gaztablo(){

yaz("R410A\n25°C = 18-21 bar\n\nR32\n25°C = 12-14 bar")

}

</script>

</body>
</html>
