<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZAFER AI HVAC</title>

<style>

body{
background:#0f172a;
font-family:Arial,sans-serif;
margin:0;
padding:20px;
color:white;
}

.header{
text-align:center;
margin-bottom:25px;
}

.header h1{
margin:0;
font-size:34px;
}

.header p{
color:#94a3b8;
margin-top:5px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
}

.card{
background:#1e293b;
padding:18px;
border-radius:14px;
text-align:center;
cursor:pointer;
font-size:17px;
transition:0.2s;
}

.card:hover{
background:#334155;
transform:scale(1.03);
}

.result{
margin-top:25px;
padding:18px;
background:#020617;
border-radius:12px;
white-space:pre-line;
font-size:16px;
}

</style>

</head>

<body>

<div class="header">
<h1>ZAFER AI</h1>
<p>HVAC SERVICE TOOL</p>
</div>

<div class="grid">

<div class="card" onclick="zaferAI()">🤖 AI TEŞHİS</div>
<div class="card" onclick="gazAnaliz()">🔥 GAZ ANALİZ</div>

<div class="card" onclick="sensor()">🌡 SENSÖR TEST</div>
<div class="card" onclick="superheat()">❄ SUPERHEAT</div>

<div class="card" onclick="subcool()">💧 SUBCOOL</div>
<div class="card" onclick="deltaT()">📉 DELTA-T</div>

<div class="card" onclick="elektrik()">⚡ ELEKTRİK TEST</div>
<div class="card" onclick="gazTablo()">📊 GAZ TABLOSU</div>

<div class="card" onclick="vrf()">🏢 VRF SERVİS</div>

</div>

<div id="sonuc" class="result">
Hazır
</div>

<script>

function yaz(x){
document.getElementById("sonuc").innerText=x
}

function zaferAI(){

let a=prompt("Arızayı yaz")

if(!a)return

a=a.toLowerCase()

let s="Teşhis bulunamadı"

if(a.includes("soğutmuyor"))
s="Gaz eksik\nKompresör çalışmıyor\n4 yollu vana"

else if(a.includes("buzlan"))
s="Gaz eksik\nHava debisi düşük\nEvaporatör kirli"

else if(a.includes("defrost"))
s="Dış serpantin kirli\nSensör arızası"

else if(a.includes("çalışmıyor"))
s="Sigorta\nKart\nKompresör"

yaz(s)

}

function gazAnaliz(){

let gaz=prompt("Gaz tipi")
let sic=prompt("Dış hava sıcaklığı")
let bar=prompt("Basınç bar")

let s=""

if(bar<16)
s="Gaz eksik"

else if(bar>24)
s="Gaz fazla"

else
s="Normal"

yaz("Gaz:"+gaz+"\nDış hava:"+sic+"\nBasınç:"+bar+"\n\n"+s)

}

function sensor(){

let ohm=prompt("Sensör kΩ")

let s=""

if(ohm>15) s="≈20°C"
else if(ohm>10) s="≈30°C"
else if(ohm>6) s="≈40°C"
else s="≈50°C"

yaz("Sensör değeri:"+ohm+"kΩ\nSıcaklık:"+s)

}

function superheat(){

let boru=prompt("Emiş boru sıcaklığı")
let evap=prompt("Evaporatör sıcaklığı")

let sh=boru-evap

yaz("Superheat:"+sh+"°C")

}

function subcool(){

let sivi=prompt("Sıvı boru sıcaklığı")
let cond=prompt("Kondens sıcaklığı")

let sc=cond-sivi

yaz("Subcool:"+sc+"°C")

}

function deltaT(){

let gir=prompt("Giriş hava")
let cik=prompt("Çıkış hava")

let dt=gir-cik

yaz("DeltaT:"+dt+"°C")

}

function elektrik(){

let amp=prompt("Kompresör amper")

let s=""

if(amp<3)
s="Kompresör zayıf"

else if(amp>10)
s="Yüksek akım"

else
s="Normal"

yaz("Amper:"+amp+"\nDurum:"+s)

}

function gazTablo(){

yaz("R410A\n25°C = 18-21 bar\n\nR32\n25°C = 12-14 bar")

}

function vrf(){

let kod=prompt("VRF hata kodu")

let s=""

if(kod=="H2")
s="IPM inverter arızası"

else if(kod=="P03")
s="Fan motor arızası"

else
s="Kod veritabanında yok"

yaz("Kod:"+kod+"\n"+s)

}

</script>

</body>
</html>
