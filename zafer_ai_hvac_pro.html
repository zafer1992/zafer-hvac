<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zafer AI HVAC</title>
<style>
body{background:#0f172a;font-family:Arial,sans-serif;margin:0;padding:20px;color:white;}
h1{text-align:center;margin-bottom:5px;}
.sub{text-align:center;color:#94a3b8;margin-bottom:25px;}
.menu{background:#1e293b;padding:16px;margin:10px 0;border-radius:12px;font-size:18px;text-align:center;cursor:pointer;user-select:none;}
.menu:hover{background:#334155;}
.result{margin-top:20px;padding:15px;background:#020617;border-radius:10px;white-space:pre-line;line-height:1.5;}
</style>
</head>
<body>
<h1>ZAFER AI</h1>
<div class="sub">HVAC Servis Asistanı</div>
<div class="menu" onclick="zaferAI()">🤖 ZAFER AI TEŞHİS</div>
<div class="menu" onclick="gazAnaliz()">🔥 GAZ ANALİZ</div>
<div class="menu" onclick="sensorTest()">🌡️ SENSÖR TEST</div>
<div class="menu" onclick="superheat()">❄️ SUPERHEAT</div>
<div class="menu" onclick="subcool()">💧 SUBCOOL</div>
<div class="menu" onclick="deltaT()">📉 DELTA-T</div>
<div class="menu" onclick="elektrik()">⚡ ELEKTRİK TEST</div>
<div class="menu" onclick="gazTablo()">📊 GAZ TABLOSU</div>
<div class="menu" onclick="vrf()">🏢 VRF SERVİS</div>
<div id="sonuc" class="result">Hazır.</div>
<script>
function yaz(x){document.getElementById('sonuc').innerText=x;}
function zaferAI(){let ariza=prompt('Arızayı yaz');if(!ariza)return;ariza=ariza.toLowerCase();let s='Teşhis bulunamadı';if(ariza.includes('soğutmuyor'))s='Gaz eksik\nKompresör çalışmıyor\n4 yollu vana';else if(ariza.includes('buzlan'))s='Gaz eksik\nHava debisi düşük\nEvaporatör kirli';else if(ariza.includes('defrost'))s='Dış serpantin kirli\nSensör arızası\nGaz eksik';else if(ariza.includes('çalışmıyor')||ariza.includes('calismiyor'))s='Sigorta\nKart\nKompresör';else if(ariza.includes('yüksek basınç')||ariza.includes('yuksek basinc'))s='Kondanser kirli\nFan düşük\nGaz fazla';else if(ariza.includes('düşük basınç')||ariza.includes('dusuk basinc'))s='Gaz eksik\nKapiler tıkalı\nKompresör zayıf';yaz(s);}
function gazAnaliz(){let gaz=prompt('Gaz tipi (R410A / R32)');if(!gaz)return;let sic=prompt('Dış hava sıcaklığı');if(!sic)return;let bar=prompt('Ölçülen basınç bar');if(!bar)return;let sonuc='';const b=parseFloat(bar);if(b<16)sonuc='Gaz eksik';else if(b>24)sonuc='Gaz fazla';else sonuc='Basınç normal';yaz('Gaz: '+gaz+'\nDış hava: '+sic+'°C\nBasınç: '+bar+' bar\n\n'+sonuc);}
function sensorTest(){let ohm=prompt('Sensör kΩ değeri');if(!ohm)return;const o=parseFloat(ohm);let t='';if(o>15)t='≈20°C';else if(o>10)t='≈30°C';else if(o>6)t='≈40°C';else t='≈50°C';yaz('Sensör değeri: '+ohm+'kΩ\nTahmini sıcaklık: '+t);}
function superheat(){let boru=prompt('Emiş boru sıcaklığı');if(!boru)return;let evap=prompt('Evaporatör sıcaklığı');if(!evap)return;let sh=parseFloat(boru)-parseFloat(evap);yaz('Superheat: '+sh+'°C');}
function subcool(){let sivi=prompt('Sıvı boru sıcaklığı');if(!sivi)return;let cond=prompt('Kondens sıcaklığı');if(!cond)return;let sc=parseFloat(cond)-parseFloat(sivi);yaz('Subcool: '+sc+'°C');}
function deltaT(){let gir=prompt('Giriş hava sıcaklığı');if(!gir)return;let cik=prompt('Çıkış hava sıcaklığı');if(!cik)return;let dt=parseFloat(gir)-parseFloat(cik);yaz('Delta-T: '+dt+'°C');}
function elektrik(){let amp=prompt('Kompresör amper');if(!amp)return;const a=parseFloat(amp);let s='';if(a<3)s='Kompresör zayıf';else if(a>10)s='Yüksek akım';else s='Normal';yaz('Amper: '+amp+'\nDurum: '+s);}
function gazTablo(){yaz('R410A\n25°C = 18-21 bar\n\nR32\n25°C = 12-14 bar');}
function vrf(){let kod=prompt('VRF hata kodu');if(!kod)return;kod=kod.toUpperCase();let s='';if(kod=='H2')s='IPM inverter arızası';else if(kod=='P03')s='Fan motor arızası';else s='Kod veritabanında yok';yaz('Kod: '+kod+'\n'+s);}
</script>
</body>
</html>
