<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HVAC AI PRO</title>

<style>
body{
margin:0;
font-family:-apple-system;
background:#0f172a;
color:white;
}

.header{
padding:20px;
font-size:20px;
font-weight:bold;
}

.sub{
font-size:13px;
color:#94a3b8;
}

.card{
background:linear-gradient(135deg,#1e293b,#334155);
margin:15px;
padding:20px;
border-radius:20px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
padding:15px;
}

.box{
background:#1e293b;
padding:20px;
border-radius:18px;
text-align:center;
font-size:15px;
cursor:pointer;
}

.screen{
display:none;
padding:15px;
}

input{
width:100%;
padding:15px;
border-radius:12px;
border:none;
margin-top:10px;
}

button{
margin-top:10px;
padding:12px;
border:none;
border-radius:12px;
background:#2563eb;
color:white;
width:100%;
}

.result{
margin-top:15px;
background:#020617;
padding:15px;
border-radius:12px;
white-space:pre-line;
}

.nav{
position:fixed;
bottom:0;
width:100%;
background:#020617;
display:flex;
justify-content:space-around;
padding:12px;
font-size:14px;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home">
<div class="header">
HVAC AI<br><span class="sub">Zafer Özkaraman</span>
</div>

<div class="card">
<h2>AI Usta</h2>
<p>Sorunları belirle ve çözüm al</p>
</div>

<div class="grid">
<div class="box" onclick="openAI()">🤖 AI Usta</div>
<div class="box">❄ Split</div>
<div class="box">🏢 VRF</div>
<div class="box">🔥 Isı Pompası</div>
<div class="box" onclick="openTools()">🔧 Servis Araçları</div>
<div class="box">📷 Foto Analiz</div>
</div>
</div>

<!-- AI -->
<div id="ai" class="screen">
<h2>AI Klima Asistanı</h2>
<input id="q" placeholder="Sorunu yaz...">
<button onclick="askAI()">Sor</button>
<div class="result" id="a">Cevap burada çıkacak</div>
</div>

<!-- TOOLS -->
<div id="tools" class="screen">
<h2>Servis Araçları</h2>

<div class="grid">
<div class="box" onclick="show('Superheat = Boru sıcaklığı - evaporasyon')">🌡 Superheat</div>
<div class="box" onclick="show('Subcool = Yoğuşma - sıvı hattı')">💧 Subcool</div>
<div class="box" onclick="show('R32: 8-12 bar\nR410A: 18-25 bar')">📊 Gaz</div>
<div class="box" onclick="show('10K NTC = 25°C')">📟 Sensör</div>
</div>

<div class="result" id="toolResult"></div>
</div>

<!-- NAV -->
<div class="nav">
<div onclick="home()">🏠</div>
<div onclick="openAI()">🤖</div>
<div onclick="openTools()">🔧</div>
</div>

<script>

function home(){
hideAll()
document.getElementById("home").style.display="block"
}

function openAI(){
hideAll()
document.getElementById("ai").style.display="block"
}

function openTools(){
hideAll()
document.getElementById("tools").style.display="block"
}

function hideAll(){
document.getElementById("home").style.display="none"
document.getElementById("ai").style.display="none"
document.getElementById("tools").style.display="none"
}

function show(txt){
document.getElementById("toolResult").innerText=txt
}

/* ====== AI (İNTERNETLİ) ====== */
async function askAI(){
let q=document.getElementById("q").value

document.getElementById("a").innerText="Düşünüyor..."

try{
let res = await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer API_KEY_YAZ"
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:[
{role:"system",content:"HVAC ustası gibi cevap ver"},
{role:"user",content:q}
]
})
})

let data = await res.json()
document.getElementById("a").innerText = data.choices[0].message.content

}catch{
document.getElementById("a").innerText="AI çalışmadı (internet/API lazım)"
}
}

</script>

</body>
</html>
